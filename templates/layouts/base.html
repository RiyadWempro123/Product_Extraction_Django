{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Pump Manual Admin</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        body{
            font-family: Arial;
            margin:0;
            background:#f4f6f9;
        }

        .navbar{
            background:#1c2b36;
            padding:15px;
            color:white;
        }

        .navbar a{
            color:white;
            margin-right:20px;
            text-decoration:none;
        }

        .container{
            padding:30px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:6px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            margin-bottom:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        table th, table td{
            border:1px solid #ddd;
            padding:10px;
        }

        table th{
            background:#f0f0f0;
        }

        button{
            padding:8px 16px;
            background:#007bff;
            border:none;
            color:white;
            border-radius:4px;
            cursor:pointer;
        }
    </style>

</head>

<body>

<div class="navbar">
    <a href="/">Dashboard</a>
    <a href="/upload/">Upload Manual</a>
    <a href="/manuals/">Manuals</a>
</div>

<div class="container">

{% block content %}
{% endblock %}

</div>

</body>
</html>
